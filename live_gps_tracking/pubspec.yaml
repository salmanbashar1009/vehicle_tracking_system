name: live_gps_tracking
description: Live Multi-Vehicle GPS Tracking System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  go_router: ^17.3.0
  firebase_core: ^4.11.0
  cloud_firestore: ^6.6.0
  firebase_auth: ^6.5.4
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  dartz: ^0.10.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  injectable_generator: ^2.3.0
  freezed: ^2.4.2
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
